<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Diskret ritningsbakgrund med byggelement -->
  
  <!-- Grund-grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(100, 120, 140, 0.08)" stroke-width="0.5"/>
    </pattern>
    <pattern id="smallGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(100, 120, 140, 0.03)" stroke-width="0.3"/>
    </pattern>
  </defs>
  
  <!-- Grid bakgrund -->
  <rect width="800" height="600" fill="url(#smallGrid)"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  
  <!-- Diskreta husritningar -->
  <g opacity="0.04" stroke="rgba(120, 140, 160, 0.6)" stroke-width="1" fill="none">
    <!-- Hus 1 -->
    <rect x="50" y="100" width="120" height="80"/>
    <line x1="50" y1="100" x2="110" y2="60"/>
    <line x1="110" y1="60" x2="170" y2="100"/>
    <rect x1="70" y1="130" width="15" height="25"/>
    <rect x1="130" y1="120" width="20" height="20"/>
    
    <!-- Hus 2 -->
    <rect x="300" y="200" width="100" height="70"/>
    <polygon points="300,200 350,170 400,200"/>
    <rect x="320" y="230" width="12" height="20"/>
    <rect x="360" y="220" width="15" height="15"/>
    
    <!-- Brygga -->
    <rect x="500" y="350" width="150" height="20"/>
    <line x1="500" y1="370" x2="650" y2="370"/>
    <line x1="520" y1="350" x2="520" y2="390"/>
    <line x1="580" y1="350" x2="580" y2="390"/>
    <line x1="630" y1="350" x2="630" y2="390"/>
    
    <!-- Trappa -->
    <g transform="translate(100,400)">
      <rect x="0" y="0" width="80" height="8"/>
      <rect x="0" y="8" width="80" height="8"/>
      <rect x="0" y="16" width="80" height="8"/>
      <rect x="0" y="24" width="80" height="8"/>
    </g>
    
    <!-- Mått-linjer -->
    <g stroke-dasharray="2,2" opacity="0.06">
      <line x1="50" y1="50" x2="170" y2="50"/>
      <line x1="50" y1="45" x2="50" y2="55"/>
      <line x1="170" y1="45" x2="170" y2="55"/>
      <text x="110" y="45" font-size="8" text-anchor="middle" fill="rgba(120, 140, 160, 0.4)">12.0m</text>
      
      <line x1="250" y1="200" x2="250" y2="270"/>
      <line x1="245" y1="200" x2="255" y2="200"/>
      <line x1="245" y1="270" x2="255" y2="270"/>
      <text x="240" y="235" font-size="8" text-anchor="middle" fill="rgba(120, 140, 160, 0.4)" transform="rotate(-90 240 235)">7.0m</text>
    </g>
    
    <!-- Dörr-symboler -->
    <g opacity="0.05">
      <path d="M 70 155 A 15 15 0 0 1 85 140" stroke-width="0.8"/>
      <path d="M 320 250 A 12 12 0 0 1 332 238" stroke-width="0.8"/>
    </g>
    
    <!-- Fönster-symboler -->
    <g stroke-width="2" opacity="0.05">
      <line x1="130" y1="120" x2="150" y2="120"/>
      <line x1="130" y1="140" x2="150" y2="140"/>
      <line x1="360" y1="220" x2="375" y2="220"/>
      <line x1="360" y1="235" x2="375" y2="235"/>
    </g>
  </g>
  
  <!-- Diskreta kompass och nord-pil -->
  <g transform="translate(720, 80)" opacity="0.03">
    <circle cx="0" cy="0" r="25" stroke="rgba(120, 140, 160, 0.6)" stroke-width="1" fill="none"/>
    <path d="M 0 -20 L 5 -5 L 0 0 L -5 -5 Z" fill="rgba(120, 140, 160, 0.6)"/>
    <text x="0" y="-30" font-size="10" text-anchor="middle" fill="rgba(120, 140, 160, 0.4)">N</text>
  </g>
</svg>
