[build]
  publish = "dist"
  command = "rm -rf dist node_modules/.cache && npm install && npm run build"

[build.environment]
  NODE_VERSION = "18"
  # Force clean build - NO FIREBASE
  SKIP_CACHE = "true"
  FORCE_REBUILD = "true"
  BUILD_VERSION = "no-firebase-2025-01-18"
  FIREBASE_REMOVED = "true"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    X-Firebase-Status = "completely-removed"
    X-Build-Version = "no-firebase-2025-01-18"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 5173
  publish = "dist"
